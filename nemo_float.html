<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMO Float — Clownfish Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: transparent;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            gap: 10px;
        }

        /* Floating Fish Button */
        .fish-button {
            width: 100px;
            height: 100px;
            cursor: pointer;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            transition: transform 0.3s ease, filter 0.3s ease;
            z-index: 100;
        }

        .fish-button:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.4));
        }

        .fish-button:active {
            transform: scale(0.95);
        }

        /* SVG Fish Animation */
        .fish-swim {
            animation: swim 3s ease-in-out infinite;
        }

        @keyframes swim {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(5px) translateY(-3px); }
            50% { transform: translateX(0) translateY(-5px); }
            75% { transform: translateX(-5px) translateY(-2px); }
        }

        .bubble {
            animation: rise 2s ease-in infinite;
            opacity: 0.6;
        }

        .bubble:nth-child(1) {
            animation-delay: 0s;
        }

        .bubble:nth-child(2) {
            animation-delay: 0.6s;
        }

        .bubble:nth-child(3) {
            animation-delay: 1.2s;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-60px) translateX(10px);
                opacity: 0;
            }
        }

        /* Chat Panel */
        .chat-panel {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            border: 1px solid rgba(255, 107, 29, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .chat-panel.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #ff6b1d 0%, #ff8c42 100%);
            padding: 16px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .chat-header-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-fish {
            width: 24px;
            height: 24px;
        }

        .close-button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.bot .message-bubble {
            background: rgba(255, 107, 29, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 107, 29, 0.4);
        }

        .message.user .message-bubble {
            background: rgba(255, 107, 29, 0.8);
            color: white;
        }

        .message-loading {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .message-loading span {
            width: 6px;
            height: 6px;
            background: rgba(255, 107, 29, 0.6);
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        .message-loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .message-loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Input Area */
        .chat-input-area {
            padding: 12px;
            border-top: 1px solid rgba(255, 107, 29, 0.2);
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 107, 29, 0.3);
            border-radius: 6px;
            padding: 10px 12px;
            color: white;
            font-size: 12px;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .chat-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 107, 29, 0.6);
            box-shadow: 0 0 8px rgba(255, 107, 29, 0.2);
        }

        .send-button {
            background: linear-gradient(135deg, #ff6b1d 0%, #ff8c42 100%);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: bold;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 29, 0.4);
        }

        .send-button:active {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 107, 29, 0.3);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 107, 29, 0.5);
        }

        /* Error message */
        .error-message {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.4);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #ff8080;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Fish Button -->
        <button class="fish-button" id="fishButton">
            <svg class="fish-swim" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
                <!-- Body -->
                <ellipse cx="80" cy="70" rx="50" ry="35" fill="#FF6B1D"/>
                <ellipse cx="65" cy="65" rx="40" ry="28" fill="#FFA726"/>
                
                <!-- Head -->
                <circle cx="35" cy="70" r="30" fill="#FF6B1D"/>
                
                <!-- White stripe (clownfish characteristic) -->
                <ellipse cx="85" cy="70" rx="20" ry="28" fill="white" opacity="0.8"/>
                <ellipse cx="120" cy="70" rx="18" ry="25" fill="white" opacity="0.8"/>
                
                <!-- Eye -->
                <circle cx="20" cy="60" r="10" fill="white"/>
                <circle cx="20" cy="60" r="6" fill="black"/>
                <circle cx="22" cy="58" r="2.5" fill="white"/>
                
                <!-- Mouth -->
                <path d="M 15 75 Q 20 80 25 75" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                
                <!-- Front fin -->
                <ellipse cx="55" cy="100" rx="12" ry="18" fill="#FF8C42" transform="rotate(-20 55 100)"/>
                
                <!-- Tail -->
                <path d="M 130 70 L 170 50 L 160 70 L 170 90 Z" fill="#FF6B1D"/>
                <path d="M 160 55 L 170 50 L 165 70" fill="white" opacity="0.6"/>
                <path d="M 160 85 L 170 90 L 165 70" fill="white" opacity="0.6"/>
                
                <!-- Back fin -->
                <ellipse cx="95" cy="45" rx="10" ry="16" fill="#FF8C42"/>
                
                <!-- Bubbles -->
                <circle class="bubble" cx="25" cy="40" r="3" fill="white" opacity="0.5"/>
                <circle class="bubble" cx="35" cy="50" r="2.5" fill="white" opacity="0.5"/>
                <circle class="bubble" cx="20" cy="60" r="2" fill="white" opacity="0.5"/>
            </svg>
        </button>

        <!-- Chat Panel -->
        <div class="chat-panel" id="chatPanel">
            <!-- Header -->
            <div class="chat-header">
                <div class="chat-header-title">
                    <svg class="header-fish" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
                        <ellipse cx="80" cy="70" rx="50" ry="35" fill="white"/>
                        <circle cx="35" cy="70" r="30" fill="white"/>
                        <circle cx="20" cy="60" r="10" fill="#333"/>
                        <circle cx="20" cy="60" r="6" fill="white"/>
                        <path d="M 130 70 L 170 50 L 160 70 L 170 90 Z" fill="white"/>
                    </svg>
                    <span>NEMO V</span>
                </div>
                <button class="close-button" id="closeButton">✕</button>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages"></div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="What would you like me to do?"
                    autocomplete="off"
                >
                <button class="send-button" id="sendButton">→</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const fishButton = document.getElementById('fishButton');
        const chatPanel = document.getElementById('chatPanel');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const closeButton = document.getElementById('closeButton');

        // State
        let isExpanded = false;
        let hasGreeted = false;

        // Event Listeners
        fishButton.addEventListener('click', toggleChat);
        closeButton.addEventListener('click', closeChat);
        sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Toggle Chat Panel
        function toggleChat() {
            isExpanded ? closeChat() : openChat();
        }

        function openChat() {
            isExpanded = true;
            chatPanel.classList.add('active');
            chatInput.focus();

            if (!hasGreeted) {
                hasGreeted = true;
                setTimeout(() => {
                    addMessage('bot', 'Hii V! 👋');
                    setTimeout(() => {
                        addMessage('bot', 'What can I do for you?');
                    }, 600);
                }, 300);
            }
        }

        function closeChat() {
            isExpanded = false;
            chatPanel.classList.remove('active');
            chatMessages.innerHTML = '';
            hasGreeted = false;
        }

        // Send Message
        function sendMessage() {
            const input = chatInput.value.trim();
            if (!input) return;

            addMessage('user', input);
            chatInput.value = '';
            sendButton.disabled = true;

            // Show loading state
            const loadingId = 'loading-' + Date.now();
            addMessage('bot', '<div class="message-loading"><span></span><span></span><span></span></div>', loadingId);

            // Parse command and send
            const command = parseCommand(input);
            sendCommand(command, loadingId);
        }

        // Parse Natural Language to Command
        function parseCommand(input) {
            const text = input.toLowerCase().trim();

            // open chrome
            if (text.match(/^open\s+chrome\s*([a-zA-Z0-9]*)\s*$/)) {
                const profile = text.match(/^open\s+chrome\s+([a-zA-Z0-9]+)/)?.[1];
                return {
                    action: 'open_app',
                    target: 'chrome',
                    ...(profile && { value: profile })
                };
            }

            // search for X
            if (text.match(/^search\s+for\s+(.+)$/) || text.match(/^search\s+(.+)$/)) {
                const query = text.replace(/^search\s+(?:for\s+)?/, '');
                return {
                    action: 'search',
                    value: query
                };
            }

            // take screenshot
            if (text.match(/^take\s+screenshot$/) || text.match(/^screenshot$/)) {
                return {
                    action: 'screenshot'
                };
            }

            // type X
            if (text.match(/^type\s+(.+)$/)) {
                const content = text.replace(/^type\s+/, '');
                return {
                    action: 'type',
                    value: content
                };
            }

            // summarize
            if (text.match(/^summarize$|^summarise$/)) {
                return {
                    action: 'summarize'
                };
            }

            // play X
            if (text.match(/^play\s+(.+)$/)) {
                const content = text.replace(/^play\s+/, '');
                return {
                    action: 'play',
                    value: content
                };
            }

            // Default: search
            return {
                action: 'search',
                value: input
            };
        }

        // Send Command to API
        function sendCommand(command, loadingId) {
            const payload = {
                ...command,
                user: 'V'
            };

            fetch('http://localhost:8765/execute', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
                .then(res => res.json())
                .then(data => {
                    removeMessageById(loadingId);
                    const response = data.result || data.message || 'Done!';
                    addMessage('bot', response);
                    scrollToBottom();
                })
                .catch(err => {
                    removeMessageById(loadingId);
                    console.error('API Error:', err);
                    addMessage('bot', `<div class="error-message">Connection error: ${err.message}. Make sure NEMO server is running on port 8765.</div>`);
                })
                .finally(() => {
                    sendButton.disabled = false;
                    chatInput.focus();
                });
        }

        // Add Message to Chat
        function addMessage(sender, text, msgId) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            if (msgId) msgDiv.id = msgId;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = text;

            msgDiv.appendChild(bubble);
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        // Remove Message by ID
        function removeMessageById(id) {
            const msg = document.getElementById(id);
            if (msg) msg.remove();
        }

        // Scroll to Bottom
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
